name: Feature Request
description: Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Help us understand the problem you're solving.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
      placeholder: Describe the feature
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? How would you use it?
      placeholder: |
        I'm building an agent that needs to...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have ideas on how to implement this, share them here.
      placeholder: |
        API could look like:
        ```typescript
        await graph.doSomething()
        ```

  - type: dropdown
    id: package
    attributes:
      label: Related Package
      description: Which package would this affect?
      options:
        - "@operad/core"
        - "@operad/adapter-memory"
        - "@operad/adapter-postgres"
        - "@operad/server"
        - "@operad/know"
        - "New package"
        - "Not sure"
