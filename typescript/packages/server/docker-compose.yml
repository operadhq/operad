# Run locally: docker compose up
# This gives you the full Operad stack in one command.
#
# Services:
#   postgres  — Event store + graph persistence
#   redis     — Event bus for async behavior processing
#   operad    — REST API server (HTTP interface)
#   worker    — Background behavior processor (consumes events from Redis)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: operad
      POSTGRES_PASSWORD: operad
      POSTGRES_DB: operad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operad"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  operad:
    build:
      context: ../../
      dockerfile: packages/server/Dockerfile
    ports:
      - "3111:3111"
    environment:
      PORT: 3111
      ADAPTER: postgres
      DATABASE_URL: postgres://operad:operad@postgres:5432/operad
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: packages/server/Dockerfile
    command: ["node", "packages/server/dist/worker.js"]
    environment:
      ADAPTER: postgres
      DATABASE_URL: postgres://operad:operad@postgres:5432/operad
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
